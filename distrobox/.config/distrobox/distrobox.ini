[fedorabox]
image=registry.fedoraproject.org/fedora-toolbox:latest
init=true
entry=false
nvidia=true

pre_init_hooks="dnf config-manager setopt fedora-cisco-openh264.enabled=0"
pre_init_hooks="dnf install -y fedora-workstation-repositories"
pre_init_hooks="dnf config-manager setopt google-chrome.enabled=1"

additional_packages="stow neovim htop ranger pwgen fd ripgrep fzf"
additional_packages="google-chrome-stable"
additional_packages="syncthing"

init_hooks="systemctl enable --now syncthing@$USER"

exported_apps="google-chrome-stable"

exported_bins="/usr/bin/htop /usr/bin/ranger /usr/bin/pwgen /usr/bin/fd /usr/bin/rg /usr/bin/fzf"
exported_bins="/usr/bin/nvim"
exported_bins_path="$HOME/.local/bin"

[archbox]
image=docker.io/library/archlinux:latest
entry=false
nvidia=true

pre_init_hooks="pacman -Sy rate-mirrors --noconfirm"
pre_init_hooks="rate-mirrors --allow-root --max-jumps=4 arch | tee /etc/pacman.d/mirrorlist"

additional_packages="stow git emacs ledger python3"

exported_apps="emacs"

exported_bins="/usr/bin/emacs"
exported_bins_path="$HOME/.local/bin"

[dev]
image=docker.io/library/archlinux:latest
replace=true
entry=false
nvidia=true
pre_init_hooks="pacman -Sy rate-mirrors --noconfirm"
pre_init_hooks="rate-mirrors --allow-root --max-jumps=4 arch | tee /etc/pacman.d/mirrorlist"
additional_packages="base-devel zed uv nvm git"

